services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: afterhours
      POSTGRES_PASSWORD: afterhours
      POSTGRES_DB: afterhours
    ports:
      - "5432:5432"
    volumes:
      - afterhours_pg:/var/lib/postgresql/data

volumes:
  afterhours_pg:
